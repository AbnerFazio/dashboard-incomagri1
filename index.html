<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Custo de Fabricação · INCOMAGRI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#1B3A5C;--blue:#2E75B6;--blue-light:#D6E4F0;--blue-bg:#EBF3FB;
  --green:#375623;--green-med:#70AD47;--green-light:#E2EFDA;
  --teal:#00897B;--teal-light:#E0F2F1;
  --orange:#ED7D31;--orange-light:#FFF5EC;
  --red:#C00000;--red-light:#FCE4D6;
  --yellow:#FFD966;
  --gray-dark:#404040;--gray-med:#7F7F7F;--gray-light:#F5F7FA;
  --white:#FFFFFF;
  --shadow:0 2px 12px rgba(0,0,0,0.08);--shadow-md:0 4px 20px rgba(0,0,0,0.13);
  --radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#EEF2F7;color:var(--gray-dark);min-height:100vh;}

/* HEADER */
.header{background:linear-gradient(135deg,#7A2500 0%,#C04A0A 45%,#F17025 100%);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:82px;box-shadow:0 4px 24px rgba(0,0,0,0.25);position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:20px;}
.logo-wrap{background:transparent;border-radius:8px;padding:5px 10px;display:flex;align-items:center;}
.logo-wrap img{height:64px;display:block;}
.header-title h1{color:white;font-size:21px;font-weight:700;letter-spacing:-.3px;}
.header-title p{color:rgba(255,255,255,0.72);font-size:11px;margin-top:2px;}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.header-badge{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:var(--yellow);font-size:12px;font-weight:600;padding:4px 14px;border-radius:20px;}
.header-date{color:rgba(255,255,255,0.65);font-size:11px;}

/* LAYOUT */
.main{padding:22px 28px;max-width:1600px;margin:0 auto;}
.section-header{display:flex;align-items:center;gap:10px;margin:26px 0 14px;}
.section-header .accent{width:4px;height:22px;border-radius:2px;background:#F17025;}
.section-header h2{font-size:15px;font-weight:700;color:#7A2500;}
.section-header .sub{font-size:11px;color:var(--gray-med);margin-left:4px;}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:6px;}
.kpi-b{border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column;}
.kpi-b:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.kpi-b .top{flex:1;padding:16px 18px 13px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.kpi-b .top .qty{font-size:34px;font-weight:900;color:white;line-height:1;letter-spacing:-1.5px;}
.kpi-b .top .qty-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:rgba(255,255,255,.65);margin-top:4px;}
.kpi-b .top .rval{text-align:right;}
.kpi-b .top .rval .rlbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.65);}
.kpi-b .top .rval .rnum{font-size:15px;font-weight:800;color:white;margin-top:3px;letter-spacing:-.2px;}
.kpi-b .bot{padding:8px 18px;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.kpi-b .bot span{font-size:10px;font-weight:600;}

/* card colors */
.kpi-b.blue .top{background:var(--blue);}
.kpi-b.blue .bot{background:#EBF3FB;}
.kpi-b.blue .bot span{color:var(--blue);}
.kpi-b.green .top{background:var(--green-med);}
.kpi-b.green .bot{background:var(--green-light);}
.kpi-b.green .bot span{color:var(--green);}
.kpi-b.orange .top{background:var(--orange);}
.kpi-b.orange .bot{background:var(--orange-light);}
.kpi-b.orange .bot span{color:#7F3A00;}
.kpi-b.navy .top{background:var(--navy);}
.kpi-b.navy .bot{background:#E8EDF4;}
.kpi-b.navy .bot span{color:var(--navy);}
.kpi-b.teal .top{background:var(--teal);}
.kpi-b.teal .bot{background:var(--teal-light);}
.kpi-b.teal .bot span{color:var(--teal);}
.kpi-b.red .top{background:var(--red);}
.kpi-b.red .bot{background:var(--red-light);}
.kpi-b.red .bot span{color:var(--red);}

/* CARDS genéricos */
.card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px;}
.card-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.card-sub{font-size:11px;color:var(--gray-med);margin-bottom:14px;}

/* GRIDS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:18px;}
.col-6040{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;margin-bottom:18px;}
.col-4060{display:grid;grid-template-columns:1fr 1.5fr;gap:18px;margin-bottom:18px;}

/* TABELAS */
.dash-table{width:100%;border-collapse:collapse;font-size:12px;}
.dash-table th{background:var(--navy);color:white;padding:8px 10px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.dash-table th.r{text-align:right;}
.dash-table td{padding:7px 10px;border-bottom:1px solid #F0F2F5;}
.dash-table tr:last-child td{border-bottom:none;font-weight:700;}
.dash-table tr:nth-child(even) td{background:#FAFBFC;}
.dash-table td.r{text-align:right;font-weight:600;}

/* STATUS BADGES */
.st{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.st-ok{background:var(--green-light);color:var(--green);}
.st-warn{background:var(--orange-light);color:#7F3A00;}
.st-bad{background:var(--red-light);color:var(--red);}
.st-neu{background:#EEF2F7;color:var(--gray-med);}

/* INSIGHTS */
.insight-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px;}
.insight{border-radius:var(--radius);padding:14px 16px;border-left:4px solid transparent;}
.insight.green{background:var(--green-light);border-color:var(--green-med);}
.insight.yellow{background:#FFFDE7;border-color:#F9A825;}
.insight.red{background:var(--red-light);border-color:var(--red);}
.insight.blue{background:var(--blue-light);border-color:var(--blue);}
.insight-title{font-size:11px;font-weight:700;margin-bottom:5px;color:var(--navy);}
.insight-text{font-size:11px;color:var(--gray-dark);line-height:1.5;}

/* TAB BAR */
.tabbar{background:white;border-bottom:2px solid #F5DFD0;padding:0 28px;display:flex;align-items:center;gap:0;box-shadow:0 2px 8px rgba(0,0,0,.06);position:sticky;top:82px;z-index:99;}
.tabbar .tab{padding:12px 22px;font-size:12px;font-weight:600;color:var(--gray-med);border-bottom:3px solid transparent;cursor:pointer;display:flex;align-items:center;gap:8px;white-space:nowrap;transition:all .2s;margin-bottom:-2px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}
.tabbar .tab:hover{color:#C04A0A;}
.tabbar .tab.active{color:#C04A0A;border-bottom-color:#F17025;font-weight:700;}
.tabbar .tab .tbadge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;}
.tabbar .tab.active .tbadge{background:#FDE8D8;color:#C04A0A;}
.tabbar .tab:not(.active) .tbadge{background:#F0F2F5;color:var(--gray-med);}
.tabbar .tab-note{margin-left:auto;font-size:10px;color:#B0B8C4;white-space:nowrap;}

/* FOOTER */
.footer{text-align:center;padding:16px 20px;font-size:10px;color:#7A2500;border-top:3px solid #F17025;margin-top:10px;background:linear-gradient(90deg,rgba(241,112,37,0.07) 0%,rgba(238,179,34,0.07) 100%);font-weight:600;}

/* ── extras para este dashboard ── */
.pill-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:6px 0 10px;gap:2px}
.pill-bar div{border-radius:2px}
.leg{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px}
.leg-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--gray-med)}
.leg-sq{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.cw{position:relative;width:100%}
.mono{font-family:'Courier New',monospace;font-size:11px}
.ref-code{font-family:'Courier New',monospace;font-size:11px;color:var(--blue);font-weight:600}
.desc-cell{color:var(--gray-med);font-size:11px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
select{background:white;border:1px solid #D0D8E4;color:var(--gray-dark);border-radius:6px;padding:5px 10px;font-size:12px;font-family:inherit;cursor:pointer;outline:none}
select:hover{border-color:var(--blue)}
.panel{display:none}.panel.active{display:block}
.nodata{text-align:center;padding:3rem;color:var(--gray-med);font-size:13px}
.err{background:var(--red-light);border:1px solid var(--red);border-radius:var(--radius);padding:1.5rem;margin:2rem auto;max-width:600px;text-align:center}
.err h2{color:var(--red);margin-bottom:.5rem;font-size:15px}
.err p{color:var(--gray-dark);font-size:13px;line-height:1.7}
code{background:#F0F2F5;padding:2px 7px;border-radius:4px;font-family:'Courier New',monospace;font-size:12px;color:var(--navy)}
.badge-mp{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-light);border-radius:10px;font-size:10px;font-weight:700;padding:2px 8px}
.badge-mo{background:var(--green-light);color:var(--green);border:1px solid #B8D9A8;border-radius:10px;font-size:10px;font-weight:700;padding:2px 8px}
.badge-mq{background:var(--orange-light);color:#7F3A00;border:1px solid #F5C8A0;border-radius:10px;font-size:10px;font-weight:700;padding:2px 8px}
.badge-up{background:var(--red-light);color:var(--red);border-radius:10px;font-size:10px;font-weight:700;padding:2px 8px}
.badge-dn{background:var(--green-light);color:var(--green);border-radius:10px;font-size:10px;font-weight:700;padding:2px 8px}
.badge-neu{background:#EEF2F7;color:var(--gray-med);border-radius:10px;font-size:10px;font-weight:700;padding:2px 8px}
.comp-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px}
.comp-label{width:36px;color:var(--gray-med);font-weight:600;font-size:11px}
.comp-track{flex:1;height:6px;background:#EEF2F7;border-radius:3px;overflow:hidden}
.comp-fill{height:100%;border-radius:3px}
.comp-pct{width:38px;text-align:right;color:var(--gray-dark);font-family:'Courier New',monospace;font-size:11px;font-weight:600}
/* Estrutura table sticky cols */
.estr-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.estr-wrap table thead th{position:sticky;top:0;z-index:3}

.delta-up{color:var(--red);font-size:11px;font-weight:600}
.delta-dn{color:var(--green-med);font-size:11px;font-weight:600}
.kpi-custo{background:white;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
.kpi-custo .top{padding:14px 16px 11px;display:flex;align-items:center;justify-content:space-between}
.kpi-custo .val{font-size:22px;font-weight:900;color:white;letter-spacing:-1px;line-height:1}
.kpi-custo .lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.65);margin-top:3px}
.kpi-custo .bot{padding:7px 16px;font-size:10px;font-weight:600}
.kpi-custo.blue .top{background:var(--blue)}.kpi-custo.blue .bot{background:var(--blue-bg);color:var(--blue)}
.kpi-custo.navy .top{background:var(--navy)}.kpi-custo.navy .bot{background:#E8EDF4;color:var(--navy)}
.kpi-custo.orange .top{background:var(--orange)}.kpi-custo.orange .bot{background:var(--orange-light);color:#7F3A00}
.kpi-custo.green .top{background:var(--green-med)}.kpi-custo.green .bot{background:var(--green-light);color:var(--green)}
.kpi-custo.red .top{background:var(--red)}.kpi-custo.red .bot{background:var(--red-light);color:var(--red)}
.kpi-custo.teal .top{background:var(--teal)}.kpi-custo.teal .bot{background:var(--teal-light);color:var(--teal)}
.kpi4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.kpi6{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px}
@media(max-width:900px){.kpi4,.kpi6{grid-template-columns:repeat(2,1fr)}.two-col,.three-col,.col-6040,.col-4060{grid-template-columns:1fr}}
</style>
</head>

<script>
const MP_C='#2E75B6', MO_C='#70AD47', MQ_C='#ED7D31';
const FAM_C={'Tanque':'#2E75B6','Dist. Esterco':'#70AD47','Pulverizador':'#C00000','Cacamba':'#ED7D31','Basculante':'#7030A0','Triturador':'#00897B','Plantadeira':'#C55A11','Espalhador':'#843C0C','Grade':'#4472C4','Outros':'#7F7F7F'};
const R=(v,d=0)=>Number(v).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});
const Rk=v=>{if(v>=1e6)return 'R$ '+R(v/1e6,1)+'M';if(v>=1e3)return 'R$ '+R(v/1e3,0)+'k';return 'R$ '+R(v,0)};
let D=null, charts={};

function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function mkChart(id,cfg){destroyChart(id);const el=document.getElementById(id);if(!el)return;charts[id]=new Chart(el,cfg);return charts[id];}

function showPanel(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  const p=document.getElementById('p-'+id); if(p)p.classList.add('active');
  if(btn)btn.classList.add('active');
}

function secHeader(title,sub=''){
  return `<div class="section-header"><div class="accent"></div><h2>${title}</h2>${sub?`<span class="sub">${sub}</span>`:''}</div>`;
}

function kpiCusto(color,val,lbl,sub,delta=''){
  return `<div class="kpi-custo ${color}">
    <div class="top"><div><div class="val">${val}</div><div class="lbl">${lbl}</div></div></div>
    <div class="bot">${sub}${delta?` &nbsp;·&nbsp; <span class="${delta.startsWith('▲')?'delta-up':'delta-dn'}">${delta}</span>`:''}</div>
  </div>`;
}

function pillBar(mp,mo,mq){
  return `<div class="pill-bar"><div style="width:${mp}%;background:${MP_C}"></div><div style="width:${mo}%;background:${MO_C}"></div><div style="width:${mq}%;background:${MQ_C}"></div></div>`;
}

function compRows(mp,mp_t,mo,mo_t,mq,mq_t){
  const rows=[['M.P.',mp,mp_t,MP_C],['M.O.',mo,mo_t,MO_C],['M.Q.',mq,mq_t,MQ_C]];
  return rows.map(([l,v,t,c])=>{
    const pct=t?Math.round(v/t*100):0;
    return `<div class="comp-row"><span class="comp-label">${l}</span>
      <div class="comp-track"><div class="comp-fill" style="width:${pct}%;background:${c}"></div></div>
      <span class="comp-pct">${pct}%</span>
      <span style="font-size:11px;color:var(--gray-dark);font-weight:600;min-width:70px;text-align:right">${Rk(v)}</span>
    </div>`;
  }).join('');
}

function insightBox(type,title,text){
  return `<div class="insight ${type}"><div class="insight-title">${title}</div><div class="insight-text">${text}</div></div>`;
}

const gridCfg={color:'rgba(0,0,0,0.05)'}, tickCfg={color:'#7F7F7F',font:{size:10}}, borderHide={color:'transparent'};

function render(d){
  D=d;
  const mes=d.mes_atual, meses=d.meses, s=d.stats_por_mes[mes]||{};
  document.getElementById('hdrMes').textContent=mes||'–';
  document.getElementById('hdrUpdate').textContent='Atualizado: '+d.gerado_em;
  document.getElementById('hdrSub').textContent=`Análise comparativa · ${meses.length} mês${meses.length!==1?'es':''} · ${s.n_produtos||0} produtos`;
  document.getElementById('tabNote').textContent=`Ref.: ${d.mes_anterior||''} → ${mes}`;
  document.getElementById('footerDiv').textContent=`INCOMAGRI · Dashboard Custo de Fabricação · ${mes}`;

  document.getElementById('mainContent').innerHTML=`
    <div id="p-visao"     class="panel active"></div>
    <div id="p-evolucao"  class="panel"></div>
    <div id="p-variacoes" class="panel"></div>
    <div id="p-produtos"  class="panel"></div>
    <div id="p-tabela"    class="panel"></div>
    <div id="p-importar" class="panel"></div>
    <div id="p-estrutura" class="panel"></div>
    <div id="p-margem"    class="panel"></div>
  `;
  renderVisao(d,mes);
  renderEvolucao(d,meses);
  renderVariacoes(d);
  renderProdutos(d,meses);
  renderTabela(d,mes);
  renderImportar();
  if(typeof renderEstrutura==="function") setTimeout(()=>renderEstrutura(), 100);
}

  const fams=Object.entries(s.familias||{}).sort((a,b)=>b[1].total-a[1].total);
  const deltaT=sa&&sa.total?((s.total-sa.total)/sa.total*100).toFixed(1):null;

  const insight2 = insightBox('blue','📦 '+fams[0][0]+' lidera a carteira',fams[0][0]+' responde por '+Rk(fams[0][1].total)+' ('+Math.round(fams[0][1].total/s.total*100)+'% do total). Família de maior impacto no mês.');

function renderRefChart(){

  mkChart('cRef',{type:'bar',data:{labels,datasets:[

function renderVariacoes(d){
  const el=document.getElementById('p-variacoes');
  const vars=d.variacoes||[];
  if(!vars.length){el.innerHTML=`<div class="nodata">Importe pelo menos 2 meses para ver variações.</div>`;return;}
  const mes_a=d.mes_atual, mes_b=d.mes_anterior;
  const altas=vars.filter(v=>v.var_pct>0).sort((a,b)=>b.var_pct-a.var_pct).slice(0,15);
  const negs=vars.filter(v=>v.var_pct<0);
  const maiorQueda=negs.length?negs.reduce((m,v)=>v.var_pct<m.var_pct?v:m):null;
  const quedas=negs.sort((a,b)=>a.var_pct-b.var_pct).slice(0,15);
  const top20=vars.slice().sort((a,b)=>Math.abs(b.var_r)-Math.abs(a.var_r)).slice(0,20).sort((a,b)=>b.var_r-a.var_r);

  function causaBadge(v){
    const c=v.principal==='M.P.'?'badge-mp':v.principal==='M.O.'?'badge-mo':'badge-mq';
    return `<span class="${c}">${v.principal}</span>`;

const MESES_BR = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

function getFamilia(desc){
  const d=(desc||'').toUpperCase();
  if(d.includes('CACAMBA'))    return 'Cacamba';
  if(d.includes('BASCULANTE')) return 'Basculante';
  if(d.includes('TANQUE')||d.includes('CTIN')) return 'Tanque';
  if(d.includes('ESTERCO')||d.includes('DELN')) return 'Dist. Esterco';
  if(d.includes('PULVERIZ')||d.includes('ATTACK')||d.includes('CHAMPION')) return 'Pulverizador';
  if(d.includes('TRITURAD')||d.includes('TIN-')) return 'Triturador';
  if(d.includes('PLANTAD')||d.includes('SEMEADORA')) return 'Plantadeira';
  return 'Outros';
}

function parseMes(raw){
  if(!raw) return null;
  if(raw instanceof Date || (typeof raw === 'number')){
    const d = raw instanceof Date ? raw : new Date(Math.round((raw-25569)*86400*1000));
    // bug VBA: dia = indice do mes
    if(d.getDate()<=12 && d.getMonth()===0){
      return MESES_BR[d.getDate()-1]+'/'+d.getFullYear();
    }
    return MESES_BR[d.getMonth()]+'/'+d.getFullYear();
  }
  return String(raw).trim();
}

  carregarRefs();

// ── Refs config ──────────────────────────────────────────
function salvarRefs(){
  const txt = document.getElementById('txtRefs').value;
  REFS_CONFIG = txt.split('\n').map(r=>r.trim()).filter(Boolean);
  localStorage.setItem('refs_config', JSON.stringify(REFS_CONFIG));
  sincronizarServidor({ refs_config: REFS_CONFIG });
  document.getElementById('msgRefs').textContent = '✅ Salvo ('+REFS_CONFIG.length+' refs)';
  setTimeout(()=>{ const m=document.getElementById('msgRefs'); if(m) m.textContent=''; }, 3000);
}

function carregarRefs(){
  const saved = localStorage.getItem('refs_config');
  if(saved){
    REFS_CONFIG = JSON.parse(saved);
    const el = document.getElementById('txtRefs');
    if(el) el.value = REFS_CONFIG.join('\n');
  }
}

// ── Histórico (localStorage) ─────────────────────────────
function carregarHistorico(){
  const saved = localStorage.getItem('historico_custo');
  HISTORICO = saved ? JSON.parse(saved) : [];
}

function salvarHistorico(){
  localStorage.setItem('historico_custo', JSON.stringify(HISTORICO));
  sincronizarServidor({ historico_custo: HISTORICO });
}

function limparHistorico(){
  HISTORICO = [];
  localStorage.removeItem('historico_custo');
  atualizarHistList();
  showMsg('Histórico apagado.','var(--red)');
}

function atualizarHistList(){
  const el = document.getElementById('histList');
  const countEl = document.getElementById('histCount');
  if(!el) return;
  if(!HISTORICO.length){
    el.innerHTML = '<span style="color:var(--gray-med);font-size:12px">Nenhum dado importado ainda.</span>';
    if(countEl) countEl.textContent = '';
    return;
  }
  const meses = [...new Set(HISTORICO.map(r=>r.mes))];
  const sorted = meses.slice().sort();
  if(countEl) countEl.textContent = `— ${HISTORICO.length} registros · ${meses.length} meses`;
  el.innerHTML = sorted.map(m=>{
    const n = HISTORICO.filter(r=>r.mes===m).length;
    return `<span style="display:inline-flex;align-items:center;gap:6px;background:var(--blue-bg);border:1px solid var(--blue-light);border-radius:20px;padding:4px 12px;margin:3px;font-size:11px;font-weight:600;color:var(--navy)">
      📅 ${m} <span style="color:var(--gray-med)">(${n})</span>
      <span onclick="deletarMes('${m}')" style="cursor:pointer;color:var(--red);font-size:13px;margin-left:2px" title="Excluir ${m}">✕</span>
    </span>`;
  }).join('');
}

function deletarMes(mes){
  if(!confirm('Excluir os dados de '+mes+'?')) return;
  HISTORICO = HISTORICO.filter(r=>r.mes !== mes);
  salvarHistorico();
  atualizarHistList();
  showMsg('Mês '+mes+' excluído.','var(--orange)');
}

function showMsg(txt, cor='var(--green)'){
  const el = document.getElementById('msgImport');
  if(el){ el.textContent=txt; el.style.color=cor; setTimeout(()=>{ if(el) el.textContent=''; }, 5000); }
}

// ── Upload handler ────────────────────────────────────────
function handleDrop(e){
  e.preventDefault();
  document.getElementById('dropZone').style.borderColor='#B0BEC5';
  document.getElementById('dropZone').style.background='#FAFBFC';
  const file = e.dataTransfer.files[0];
  if(file) processFile(file);
}

function handleFileInput(e){
  const file = e.target.files[0];
  if(file) processFile(file);
}

let DADOS_ERP_BRUTOS = []; // cache dos dados lidos

function processFile(file){
  const status = document.getElementById('fileStatus');
  status.textContent = 'Lendo '+file.name+'...';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, dateNF:'yyyy-mm-dd'});
      // Skip header row if first col is text like "Cód"
      const dataRows = rows.filter((r,i)=>{
        if(i===0 && isNaN(parseFloat(r[0]))) return false;
        return r[0]||r[1];
      });
      DADOS_ERP_BRUTOS = dataRows;
      status.textContent = '✅ '+file.name+' — '+dataRows.length+' linhas carregadas';
      status.style.color = 'var(--green)';
    } catch(err){
      status.textContent = '❌ Erro ao ler arquivo: '+err.message;
      status.style.color = 'var(--red)';
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── Parse paste data ──────────────────────────────────────
function parsePaste(txt){
  const rows = [];
  txt.split('\n').forEach(line=>{
    const cols = line.split('\t');
    if(cols.length >= 9 && (cols[0]||cols[1])){
      rows.push(cols);
    }
  });
  return rows;
}

// ── Processar ─────────────────────────────────────────────
function processarMes(){
  carregarRefs();
  if(!REFS_CONFIG.length){
    showMsg('⚠ Nenhuma referência configurada. Salve as referências antes de processar.','var(--red)');
    return;
  }

  const mesNome = document.getElementById('selMesImp').value;
  const ano = document.getElementById('selAnoImp').value;
  const mesRef = mesNome+'/'+ano;

  // Decide fonte de dados
  let rawRows = [];
  const pasteTxt = document.getElementById('txtPaste').value.trim();
  if(pasteTxt){
    rawRows = parsePaste(pasteTxt);
  } else if(DADOS_ERP_BRUTOS.length){
    rawRows = DADOS_ERP_BRUTOS;
  } else {
    showMsg('⚠ Nenhum dado encontrado. Faça upload do .xlsx ou cole os dados do ERP.','var(--red)');
    return;
  }

  // Verifica se mês já existe
  const jaExiste = HISTORICO.some(r=>r.mes===mesRef);
  if(jaExiste){
    if(!confirm('O mês '+mesRef+' já foi importado. Deseja substituir?')) return;
    HISTORICO = HISTORICO.filter(r=>r.mes!==mesRef);
  }

  // Filtra e processa
  // Cols esperadas: 0=CodProd, 1=Ref, 2=Desc, 3=Grupo, 4=Tipo, 5=MP, 6=MO, 7=MQ, 8=Total
  let count = 0;
  rawRows.forEach(row=>{
    const ref = String(row[1]||'').trim();
    if(!ref) return;
    if(!REFS_CONFIG.includes(ref)) return;
    const mp = parseFloat(String(row[5]||'0').replace(',','.')) || 0;
    const mo = parseFloat(String(row[6]||'0').replace(',','.')) || 0;
    const mq = parseFloat(String(row[7]||'0').replace(',','.')) || 0;
    const total = parseFloat(String(row[8]||'0').replace(',','.')) || 0;
    const desc = String(row[2]||'').trim();
    HISTORICO.push({
      mes: mesRef,
      ref: ref,
      desc: desc,
      familia: getFamilia(desc),
      mp: Math.round(mp*100)/100,
      mo: Math.round(mo*100)/100,
      mq: Math.round(mq*100)/100,
      total: Math.round(total*100)/100
    });
    count++;
  });

  if(!count){
    showMsg('⚠ Nenhuma das referências configuradas foi encontrada nos dados. Verifique se as refs estão corretas e se os dados foram carregados.','var(--red)');
    return;
  }

  salvarHistorico();
  atualizarHistList();

  // Limpa campos
  const tp = document.getElementById('txtPaste');
  if(tp) tp.value='';
  DADOS_ERP_BRUTOS = [];
  const fs = document.getElementById('fileStatus');
  if(fs) fs.textContent='';
  const fi = document.getElementById('fileInput');
  if(fi) fi.value='';

  showMsg('✅ '+count+' referências importadas para '+mesRef+'. Atualizando dashboard...','var(--green)');

  // Rebuild data and re-render dashboard
  setTimeout(()=>{ rebuildAndRender(); }, 800);
}

// ── Rebuild data structure from HISTORICO ────────────────
function rebuildAndRender(){
  if(!HISTORICO.length) return;

  // Sort months chronologically
  const mesesMap = {};
  HISTORICO.forEach(r=>{
    const parts = r.mes.split('/');
    const mIdx = MESES_BR.indexOf(parts[0]);
    const yr = parseInt(parts[1])||2025;
    const key = yr*100 + mIdx;
    mesesMap[key] = r.mes;
  });
  const meses = Object.keys(mesesMap).sort((a,b)=>a-b).map(k=>mesesMap[k]);

  // calc stats per mes
  function calcStats(mes){
    const itens = HISTORICO.filter(r=>r.mes===mes);
    if(!itens.length) return null;
    const mp=itens.reduce((s,r)=>s+r.mp,0);
    const mo=itens.reduce((s,r)=>s+r.mo,0);
    const mq=itens.reduce((s,r)=>s+r.mq,0);
    const tot=itens.reduce((s,r)=>s+r.total,0);
    const fam={};
    itens.forEach(r=>{
      if(!fam[r.familia]) fam[r.familia]={mp:0,mo:0,mq:0,total:0,n:0};
      fam[r.familia].mp+=r.mp; fam[r.familia].mo+=r.mo;
      fam[r.familia].mq+=r.mq; fam[r.familia].total+=r.total; fam[r.familia].n++;
    });
    return {n_produtos:itens.length,total:Math.round(tot*100)/100,
      mp:Math.round(mp*100)/100,mo:Math.round(mo*100)/100,mq:Math.round(mq*100)/100,
      mp_pct:tot?Math.round(mp/tot*1000)/10:0,
      mo_pct:tot?Math.round(mo/tot*1000)/10:0,
      mq_pct:tot?Math.round(mq/tot*1000)/10:0,
      familias:fam, produtos:[...itens].sort((a,b)=>b.total-a.total)};
  }

  const stats_por_mes={};
  meses.forEach(m=>{ const s=calcStats(m); if(s) stats_por_mes[m]=s; });

  // evolucao
  const refs = [...new Set(HISTORICO.map(r=>r.ref))].sort();
  const evolucao={};
  refs.forEach(ref=>{
    const first = HISTORICO.find(r=>r.ref===ref);
    evolucao[ref]={desc:first.desc, familia:first.familia,
      serie: meses.map(mes=>{
        const r=HISTORICO.find(h=>h.ref===ref&&h.mes===mes);
        return r?{mes,mp:r.mp,mo:r.mo,mq:r.mq,total:r.total}:{mes,mp:null,mo:null,mq:null,total:null};
      })};
  });

  // variacoes
  let variacoes=[];
  if(meses.length>=2){
    const mes_a=meses[meses.length-1], mes_b=meses[meses.length-2];
    const prods_a = HISTORICO.filter(r=>r.mes===mes_a);
    prods_a.forEach(prod=>{
      const ant = HISTORICO.find(r=>r.ref===prod.ref&&r.mes===mes_b);
      if(ant){
        const vr=Math.round((prod.total-ant.total)*100)/100;
        const vp=ant.total?Math.round(vr/ant.total*1000)/10:0;
        const mp_r=Math.round((prod.mp-ant.mp)*100)/100;
        const mo_r=Math.round((prod.mo-ant.mo)*100)/100;
        const mq_r=Math.round((prod.mq-ant.mq)*100)/100;
        const mp_p=ant.mp?Math.round(mp_r/ant.mp*1000)/10:0;
        const mo_p=ant.mo?Math.round(mo_r/ant.mo*1000)/10:0;
        const mq_p=ant.mq?Math.round(mq_r/ant.mq*1000)/10:0;
        const imp=[['M.P.',mp_r],['M.O.',mo_r],['M.Q.',mq_r]];
        const sameDir=imp.filter(([,v])=>(v>0)===(vr>0)&&v!==0);
        const principal=(sameDir.length?sameDir:imp).reduce((a,b)=>Math.abs(b[1])>Math.abs(a[1])?b:a,['–',0])[0];
        variacoes.push({ref:prod.ref,desc:prod.desc,familia:prod.familia,
          total_atual:prod.total,total_ant:ant.total,var_r:vr,var_pct:vp,
          mp_r,mo_r,mq_r,mp_pct:mp_p,mo_pct:mo_p,mq_pct:mq_p,principal});
      }
    });
    variacoes.sort((a,b)=>Math.abs(b.var_pct)-Math.abs(a.var_pct));
  }

  const d={
    gerado_em: new Date().toLocaleString('pt-BR').slice(0,16),
    arquivo_origem: 'Dashboard (importação direta)',
    meses, mes_atual:meses[meses.length-1],
    mes_anterior:meses.length>=2?meses[meses.length-2]:null,
    stats_por_mes, evolucao, variacoes
  };

  render(d);
  // Switch to visao geral
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  const firstTab = document.querySelector('.tab');
  if(firstTab) firstTab.classList.add('active');
  showPanel('visao', firstTab);
}

// ── Export dados.json ─────────────────────────────────────
function exportarJSON(){
  if(!HISTORICO.length){ showMsg('Nenhum dado para exportar.','var(--red)'); return; }
  rebuildAndRender();
  setTimeout(()=>{
    if(!D) return;
    const blob = new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='dados.json'; a.click();
    showMsg('✅ dados.json exportado! Substitua o arquivo na pasta do dashboard.','var(--teal)');
  },300);
}

// ════════════════════════════════════════════════════════════════════════
// Armazena estruturas importadas: { ref_produto: { mes: [ {item} ] } }
// item = { cod, ref, desc, qtd, unit_mp, total_mp,
//          proc_mo, desc_mo, tempo_mo, unit_mo, total_mo,
//          cod_maq, desc_mq, tempo_mq, unit_mq, total_mq }

let ESTRUTURAS = {}; // { 'ref_produto': { 'Abr/2026': [items...] } }

const MESES_ORDER = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

function sortMesesEstr(meses){
  return meses.slice().sort((a,b)=>{
    const [ma,ya] = a.split('/'), [mb,yb] = b.split('/');
    return (parseInt(ya)*12 + MESES_ORDER.indexOf(ma)) -
           (parseInt(yb)*12 + MESES_ORDER.indexOf(mb));
  });
}

function salvarEstruturas(){
  try{ localStorage.setItem('estruturas_prod', JSON.stringify(ESTRUTURAS)); }catch(e){}
  sincronizarServidor({ estruturas_prod: ESTRUTURAS });
}
function carregarEstruturas(){
  try{
    const s = localStorage.getItem('estruturas_prod');
    if(s) ESTRUTURAS = JSON.parse(s);
  }catch(e){ ESTRUTURAS = {}; }
}

// ── Parser do CSV de estrutura ───────────────────────────────────────────────
function parseEstruturaCsv(txt){
  const lines = txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  const results = [];
  let currentProd = null;
  let mpItems=[], moItems=[], mqItems=[];

  function fBR(s){ return parseFloat((s||'').trim().replace(/\./g,'').replace(',','.')) || 0; }

  function flushProd(){
    if(currentProd){
      results.push({ ...currentProd, mpItems:[...mpItems], moItems:[...moItems], mqItems:[...mqItems] });
    }
    mpItems=[]; moItems=[]; mqItems=[];
  }

  for(let i=0;i<lines.length;i++){
    const line = lines[i].trim();
    if(!line) continue;

    if(line.startsWith('Produto:')){
      flushProd();
      const refM  = line.match(/Refer.{1,5}:\s*([^\s\-]+)/);
      const descM = line.match(/Descri.{1,5}:\\s*(.+?)\\s*(?:-\\s*Grupo|;|$)/);
      const codM  = line.match(/Produto:\s*Produto:\s*(\d+)/);
      currentProd = {
        cod:  codM  ? codM[1].trim()  : '',
        ref:  refM  ? refM[1].trim()  : '',
        desc: descM ? descM[1].trim() : '',
      };
      continue;
    }

    if(line.startsWith('Produto / Produto MP')) continue;

    const cols = line.split(';');
    if(cols.length < 6) continue;
    const codMp = cols[0].trim();
    if(!codMp || isNaN(codMp.replace(/\./g,'').replace(',',''))) continue;

    // MP — cols 0-6
    if(cols[1] && cols[1].trim() && cols[5] && cols[5].trim()){
      mpItems.push({
        cod: cols[0].trim(), ref: cols[1].trim(), desc: (cols[2]||'').trim(),
        qtd: fBR(cols[3]), unit: fBR(cols[4]), total: fBR(cols[5]),
        data: (cols[6]||'').trim(),
      });
    }
    // MO — cols 7-11
    if(cols.length>=12 && cols[8] && cols[8].trim() && cols[11] && cols[11].trim()){
      moItems.push({
        cod: (cols[7]||'').trim(), desc: cols[8].trim(),
        tempo: (cols[9]||'').trim(), unit: fBR(cols[10]), total: fBR(cols[11]),
      });
    }
    // MQ — cols 12-16
    if(cols.length>=17 && cols[13] && cols[13].trim() && cols[16] && cols[16].trim()){
      mqItems.push({
        cod: (cols[12]||'').trim(), desc: cols[13].trim(),
        tempo: (cols[14]||'').trim(), unit: fBR(cols[15]), total: fBR(cols[16]),
      });
    }
  }
  flushProd();
  return results;
}


function importarEstruturaCsv(txt, mesRef){
  const parsed = parseEstruturaCsv(txt);
  if(!parsed.length) return 0;
  let count = 0;
  parsed.forEach(p => {
    const ref = p.ref || p.cod;
    if(!ref) return;
    if(!ESTRUTURAS[ref]) ESTRUTURAS[ref] = { cod:p.cod, desc:p.desc, meses:{} };
    // Sempre atualiza cod e desc
    if(p.cod)  ESTRUTURAS[ref].cod  = p.cod;
    if(p.desc) ESTRUTURAS[ref].desc = p.desc;
    ESTRUTURAS[ref].meses[mesRef] = {
      mpItems: p.mpItems,
      moItems: p.moItems,
      mqItems: p.mqItems,
      totalMp: p.mpItems.reduce((s,i)=>s+i.total,0),
      totalMo: p.moItems.reduce((s,i)=>s+i.total,0),
      totalMq: p.mqItems.reduce((s,i)=>s+i.total,0),
    };
    count++;
  });
  salvarEstruturas();
  return count;
}

// ── Detalhe da estrutura ──────────────────────────────────────────────────────
function renderDetalheEstr(){
  const sel = document.getElementById('selProdEstr');
  if(!sel) return;
  const ref = sel.value;
  if(!ref || !ESTRUTURAS[ref]) return;

  const prod  = ESTRUTURAS[ref];
  const meses = sortMesesEstr(Object.keys(prod.meses));
  const el    = document.getElementById('detalheEstr');
  const infoEl= document.getElementById('mesEstrInfo');
  if(infoEl) infoEl.textContent = meses.length+' mês'+(meses.length!==1?'es':'')+' importado'+(meses.length!==1?'s':'');

  if(!meses.length){
    el.innerHTML='<div class="nodata">Nenhum mês importado para este produto.</div>';
    return;
  }

  function getMes(m){
    const d = prod.meses[m];
    if(!d) return {mpItems:[],moItems:[],mqItems:[],totalMp:0,totalMo:0,totalMq:0};
    // Suporte ao formato antigo (array simples) e novo (objeto com mpItems/moItems/mqItems)
    if(Array.isArray(d)){
      const mp = d.filter(i=>i.total_mp||i.total>0);
      return {
        mpItems: d.map(i=>({cod:i.cod||'',ref:i.ref||'',desc:i.desc||'',total:i.total_mp||i.total||0})),
        moItems: d.filter(i=>i.total_mo>0).map(i=>({desc:i.desc_mo||i.desc||'',total:i.total_mo||0})),
        mqItems: d.filter(i=>i.total_mq>0).map(i=>({desc:i.desc_maq||i.desc||'',total:i.total_mq||0})),
        totalMp: d.reduce((s,i)=>s+(i.total_mp||i.total||0),0),
        totalMo: d.reduce((s,i)=>s+(i.total_mo||0),0),
        totalMq: d.reduce((s,i)=>s+(i.total_mq||0),0),
      };
    }
    return d;
  }
  function fl(v){ return Math.round((v||0)*100)/100; }
  function varP(curr,prev){ return prev>0 ? fl((curr-prev)/prev*100) : null; }

  const totMp  = meses.map(m=>fl(getMes(m).totalMp));
  const totMo  = meses.map(m=>fl(getMes(m).totalMo));
  const totMq  = meses.map(m=>fl(getMes(m).totalMq));
  const totAll = meses.map((_,i)=>fl(totMp[i]+totMo[i]+totMq[i]));

  const li = meses.length-1;
  const pi = meses.length>=2 ? li-1 : null;

    return `<span class="${cls}" style="font-size:11px">${sym} ${R(Math.abs(r),2)} (${r>0?'+':''}${(p||0).toFixed(1)}%)</span>`;

  }

  const vMp  = pi!==null ? fl(totMp[li]-totMp[pi])   : null;

  const chartId  = 'chartEstrTotal';

  <div class="kpi4" style="margin-bottom:18px">

      <div class="val">${Rk(totAll[li])}</div><div class="lbl">Custo Total — ${lastMes}</div>

function buildCompTable(tableId, getItems, keyFn, labelFn, color, tipo){
  const prod = ESTRUTURAS[document.getElementById('selProdEstr').value];
  const ref  = document.getElementById('selProdEstr').value;
  if(!prod) return;
  const meses = sortMesesEstr(Object.keys(prod.meses));
  function getMes(m){
    const d = prod.meses[m];
    if(!d) return {mpItems:[],moItems:[],mqItems:[],totalMp:0,totalMo:0,totalMq:0};
    // Suporte ao formato antigo (array simples) e novo (objeto com mpItems/moItems/mqItems)
    if(Array.isArray(d)){
      const mp = d.filter(i=>i.total_mp||i.total>0);
      return {
        mpItems: d.map(i=>({cod:i.cod||'',ref:i.ref||'',desc:i.desc||'',total:i.total_mp||i.total||0})),
        moItems: d.filter(i=>i.total_mo>0).map(i=>({desc:i.desc_mo||i.desc||'',total:i.total_mo||0})),
        mqItems: d.filter(i=>i.total_mq>0).map(i=>({desc:i.desc_maq||i.desc||'',total:i.total_mq||0})),
        totalMp: d.reduce((s,i)=>s+(i.total_mp||i.total||0),0),
        totalMo: d.reduce((s,i)=>s+(i.total_mo||0),0),
        totalMq: d.reduce((s,i)=>s+(i.total_mq||0),0),
      };
    }
    return d;
  }
  function fl(v){ return Math.round((v||0)*100)/100; }
  function varP(curr,prev){ return prev>0 ? fl((curr-prev)/prev*100) : null; }

  const allKeys=[], keySeen=new Set(), keyFirstMes={};
  meses.forEach((m,mi)=>{
    getItems(getMes(m)).forEach(it=>{
      const k=keyFn(it);
      if(!keySeen.has(k)){ keySeen.add(k); allKeys.push({key:k,label:labelFn(it)}); keyFirstMes[k]=mi; }
    });
  });

  let h1=`<th colspan="3" style="background:var(--navy);color:white;padding:5px 8px;position:sticky;left:0;z-index:2">Item</th>`;
  let h2=`<th style="background:#1B3A5C;color:rgba(255,255,255,.5);font-size:9px;padding:3px 5px;width:80px;position:sticky;left:0;z-index:2">Cód.</th>
           <th style="background:#1B3A5C;color:rgba(255,255,255,.5);font-size:9px;padding:3px 5px;min-width:160px;max-width:200px;position:sticky;left:80px;z-index:2">Descrição</th>
           <th style="background:#1B3A5C;color:rgba(255,255,255,.5);font-size:9px;padding:3px 5px;width:28px">✕</th>`;
  meses.forEach((m,mi)=>{
    const isL=mi===meses.length-1, hasVar=mi>0;
    const mShort = m.replace('/20','/');
    h1+=`<th colspan="${hasVar?3:1}" style="background:${isL?'#1B3A5C':'var(--navy)'};color:white;padding:4px 6px;text-align:center;border-left:3px solid rgba(255,255,255,.25);white-space:nowrap;font-size:10px">${mShort}${isL?' ←':''}</th>`;
    h2+=`<th style="background:${isL?'#1B3A5C':'#2E5090'};color:${color};padding:3px 5px;font-size:9px;border-left:3px solid rgba(255,255,255,.2);width:62px">R$</th>`;
    if(hasVar) h2+=`<th style="background:#B7202088;color:white;padding:3px 5px;font-size:9px;width:58px">Δ R$</th><th style="background:#B7202088;color:white;padding:3px 5px;font-size:9px;width:44px">Δ %</th>`;
  });

  let rows='';
  allKeys.forEach((item,idx)=>{
    const isNew   = keyFirstMes[item.key]===meses.length-1 && meses.length>1;
    const lastHas = !!getItems(getMes(meses[meses.length-1])).find(i=>keyFn(i)===item.key);
    const isAbs   = !lastHas && meses.length>1;
    const rowBg   = isNew?'#F0FBF5':isAbs?'#FEFBEC':(idx%2===0?'white':'#F8FAFB');
    const rowBdr  = isNew?'border-left:3px solid #27AE60':isAbs?'border-left:3px solid #F39C12':'border-left:3px solid transparent';
    let badge='';
    if(isNew) badge=`<span style="background:#E8F8F0;color:#196F3D;border:1px solid #A9DFBF;border-radius:10px;font-size:9px;font-weight:700;padding:1px 6px;display:inline-block;margin-top:2px;white-space:nowrap">✦ Item novo</span>`;
    if(isAbs) badge=`<span style="background:#FEF9E7;color:#7D6608;border:1px solid #F9E79F;border-radius:10px;font-size:9px;font-weight:700;padding:1px 6px;display:inline-block;margin-top:2px;white-space:nowrap">⚠ Não encontrado</span>`;
    const sk=item.key.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const delBtn=`<button onclick="excluirItemEstrutura('${ref}','${tipo}','${sk}',this)" title="Excluir de todos os meses" style="background:none;border:1px solid #FADBD8;border-radius:4px;color:#C0392B;font-size:10px;padding:2px 6px;cursor:pointer" onmouseover="this.style.background='#FADBD8'" onmouseout="this.style.background='none'">✕</button>`;

    let row=`<tr style="background:${rowBg};${rowBdr}">
      <td class="mono" style="color:var(--gray-med);font-size:10px;position:sticky;left:0;background:${rowBg};z-index:1;white-space:nowrap;padding:4px 5px">${item.key}</td>
      <td style="position:sticky;left:80px;background:${rowBg};z-index:1;min-width:160px;max-width:200px;padding:4px 5px"><div class="desc-cell" title="${item.label}">${item.label}</div>${badge}</td>
      <td style="width:28px;text-align:center;padding:2px">${delBtn}</td>`;

    let prevVal=null;
    meses.forEach((m,mi)=>{
      const it=getItems(getMes(m)).find(i=>keyFn(i)===item.key);
      const v=it?fl(it.total):null;
      const isL=mi===meses.length-1;
      if(v===null){
        const txt=(mi===meses.length-1&&!isNew)?`<span style="color:#B7950B;font-size:10px;font-weight:600">Não encontrado</span>`:`<span style="color:#ccc">–</span>`;
        row+=`<td style="border-left:3px solid #E8EDF4;text-align:center">${txt}</td>`;
        if(mi>0) row+=`<td style="color:#ccc;text-align:center">–</td><td style="color:#ccc;text-align:center">–</td>`;
      } else {
        row+=`<td class="r mono" style="border-left:3px solid #E8EDF4;${isL?'font-weight:700':''};font-size:10px;padding:3px 5px;white-space:nowrap">${R(v,2)}</td>`;
        if(mi>0){
          if(prevVal!==null){
            const dR=fl(v-prevVal),dP=varP(v,prevVal),sc=dR>0?'st-bad':'st-ok',sym=dR>0?'▲':'▼';
            row+=`<td class="r" style="padding:2px 3px"><span class="st ${sc}" style="font-size:8px;padding:1px 3px;white-space:nowrap">${sym}${R(Math.abs(dR),2)}</span></td><td class="r" style="padding:2px 3px"><span class="st ${sc}" style="font-size:8px;padding:1px 3px;white-space:nowrap">${dR>0?'+':''}${(dP||0).toFixed(1)}%</span></td>`;
          } else {
            row+=`<td style="text-align:center"><span style="color:#196F3D;font-size:9px;font-weight:600">Novo</span></td><td>–</td>`;
          }
        }
        prevVal=v;
      }
    });
    rows+=row+'</tr>';
  });

  let totRow=`<tr style="background:#EBF3FB;font-weight:700;border-top:2px solid var(--navy)"><td colspan="3" style="padding:5px 8px;color:var(--navy);position:sticky;left:0;background:#EBF3FB;z-index:1">TOTAL</td>`;
  let ptv=null;
  meses.forEach((m,mi)=>{
    const tot=fl(getItems(getMes(m)).reduce((s,i)=>s+i.total,0));
    totRow+=`<td class="r mono" style="border-left:3px solid var(--navy)">${R(tot,2)}</td>`;
    if(mi>0&&ptv!==null){
      const dR=fl(tot-ptv),dP=varP(tot,ptv),sc=dR>0?'st-bad':'st-ok',sym=dR>0?'▲':'▼';
      totRow+=`<td class="r"><span class="st ${sc}" style="font-size:9px">${sym}${R(Math.abs(dR),2)}</span></td><td class="r"><span class="st ${sc}" style="font-size:9px">${dR>0?'+':''}${(dP||0).toFixed(1)}%</span></td>`;
    } else if(mi>0){ totRow+=`<td>–</td><td>–</td>`; }
    ptv=tot;
  });
  totRow+='</tr>';
  const tbl=document.getElementById(tableId);
  if(tbl) tbl.innerHTML=`<thead><tr>${h1}</tr><tr>${h2}</tr></thead><tbody>${rows}${totRow}</tbody>`;
}

// ── Excluir item da estrutura ─────────────────────────────────────────────────
function excluirItemEstrutura(refProd, tipo, key, btnEl){
  if(!confirm('Excluir "'+key+'" de todos os meses?')) return;
  if(!ESTRUTURAS[refProd]) return;
  Object.keys(ESTRUTURAS[refProd].meses).forEach(mes=>{
    const d=ESTRUTURAS[refProd].meses[mes]; if(!d) return;
    if(tipo==='mp'){ d.mpItems=d.mpItems.filter(i=>i.ref!==key);  d.totalMp=d.mpItems.reduce((s,i)=>s+i.total,0); }
    if(tipo==='mo'){ d.moItems=d.moItems.filter(i=>i.desc!==key); d.totalMo=d.moItems.reduce((s,i)=>s+i.total,0); }
    if(tipo==='mq'){ d.mqItems=d.mqItems.filter(i=>i.desc!==key); d.totalMq=d.mqItems.reduce((s,i)=>s+i.total,0); }
  });
  salvarEstruturas();
  const row=btnEl.closest('tr');
  if(row){ row.style.transition='opacity .3s'; row.style.opacity='0'; setTimeout(()=>row.remove(),300); }
}

// ── Handlers de arquivo CSV ───────────────────────────────────────────────────
let csvEstrBuffer = '';

function handleDropEstr(e){
  e.preventDefault();
  document.getElementById('dropEstr').style.borderColor='#B0BEC5';
  const file = e.dataTransfer.files[0];
  if(file) readCsvEstr(file);
}
function handleFileEstr(e){
  const file = e.target.files[0];
  if(file) readCsvEstr(file);
}
function readCsvEstr(file){
  const reader = new FileReader();
  reader.onload = ev => {
    csvEstrBuffer = ev.target.result;
    const d = document.getElementById('dropEstr');
    if(d) d.innerHTML = `<span style="font-size:12px;font-weight:600;color:var(--green)">✅ ${file.name} carregado</span>`;
  };
  reader.readAsText(file, 'UTF-8');
}
function processarCsvEstr(){
  if(!csvEstrBuffer){
    const msg = document.getElementById('msgEstr');
    if(msg){ msg.textContent='⚠ Selecione um arquivo CSV primeiro.'; msg.style.color='var(--red)'; }
    return;
  }
  const mes  = document.getElementById('selMesEstr').value;
  const ano  = document.getElementById('selAnoEstr').value;
  const mesRef = mes+'/'+ano;
  const count  = importarEstruturaCsv(csvEstrBuffer, mesRef);
  const msg = document.getElementById('msgEstr');
  if(msg){
    if(count > 0){
      msg.textContent = `✅ ${count} produto(s) importado(s) para ${mesRef}. Atualizando...`;
      msg.style.color = 'var(--green)';
    } else {
      msg.textContent = '⚠ Nenhum produto encontrado no CSV. Verifique o formato do arquivo.';
      msg.style.color = 'var(--red)';
    }
  }
  csvEstrBuffer = '';
  const fi = document.getElementById('fileEstr');
  if(fi) fi.value = '';
  if(count > 0){
    // Força sync imediato das estruturas (não debounced)
    clearTimeout(_syncTimer);
    _pushSupabase({ estruturas_prod: ESTRUTURAS });
    setTimeout(()=>renderEstrutura(), 400);
  }
}

// Armazena preços de venda: { ref: preco }
let PRECOS = {};

function salvarPrecos(){
  try{ localStorage.setItem('precos_venda', JSON.stringify(PRECOS)); }catch(e){}
  sincronizarServidor({ precos_venda: PRECOS });
}
function carregarPrecos(){
  try{
    const s = localStorage.getItem('precos_venda');
    if(s) PRECOS = JSON.parse(s);
  }catch(e){ PRECOS = {}; }
}

function renderMargem(){
  carregarPrecos();
  const el = document.getElementById('p-margem');
  if(!el) return;

  // Pega ultimo mes do historico
  const saved = localStorage.getItem('historico_custo');
  let historico = [];
  try{ historico = saved ? JSON.parse(saved) : []; }catch(e){}

  // Meses ordenados
  const MESES_O = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  function sortMes(a,b){
    const [ma,ya]=a.split('/'), [mb,yb]=b.split('/');
    return (parseInt(ya)*12+MESES_O.indexOf(ma))-(parseInt(yb)*12+MESES_O.indexOf(mb));
  }

  // Todos os meses disponíveis — combina localStorage historico + SEED/D + Estruturas
  const mesesHist = [...new Set(historico.map(r=>r.mes))];
  const mesesD    = D ? Object.keys(D.stats_por_mes) : [];
  // Coleta meses de ESTRUTURAS (importados pela aba Estrutura do Produto)
  const mesesEstr = [];
  carregarEstruturas();
  Object.values(ESTRUTURAS).forEach(prod=>{
    Object.keys(prod.meses||{}).forEach(m=>{ if(!mesesEstr.includes(m)) mesesEstr.push(m); });
  });
  const todosMeses = [...new Set([...mesesHist, ...mesesD, ...mesesEstr])].sort(sortMes);
  const mesAtual   = todosMeses.length ? todosMeses[todosMeses.length-1] : null;

  // Produtos do mês selecionado
  function getProdutosMes(mes){
    const map = {};
    historico.filter(r=>r.mes===mes).forEach(r=>{
      const custo = Math.round((r.mp + r.mo + r.mq)*100)/100;
      map[r.ref] = {
        ref:    r.ref,
        desc:   r.desc,
        familia:r.familia,
        mp:     Math.round(r.mp*100)/100,
        mo:     Math.round(r.mo*100)/100,
        mq:     Math.round(r.mq*100)/100,
        custo:  custo,
        preco:  PRECOS[r.ref] || 0,
      };
    });
    // Se não há histórico, tenta SEED/D
    if(!Object.keys(map).length && D && D.stats_por_mes[mes]){
      (D.stats_por_mes[mes].produtos||[]).forEach(r=>{
        const custo = Math.round((r.mp + r.mo + r.mq)*100)/100;
        map[r.ref] = { ref:r.ref, desc:r.desc, familia:r.familia,
          mp:r.mp, mo:r.mo, mq:r.mq, custo, preco: PRECOS[r.ref]||0 };
      });
    }
    return Object.values(map).sort((a,b)=>b.custo-a.custo);
  }

  // KPIs
  function calcKpis(prods){
    const comPreco = prods.filter(p=>p.preco>0);
    if(!comPreco.length) return null;
    const totalCusto  = comPreco.reduce((s,p)=>s+p.custo,0);
    const totalPreco  = comPreco.reduce((s,p)=>s+p.preco,0);
    const totalMargem = totalPreco - totalCusto;
    const margemPct   = totalPreco > 0 ? totalMargem/totalPreco*100 : 0;
    const markupPct   = totalCusto > 0 ? totalMargem/totalCusto*100 : 0;
    return { totalCusto, totalPreco, totalMargem, margemPct, markupPct,
             n: comPreco.length, prejuizo: comPreco.filter(p=>p.preco<p.custo).length };
  }

  const mesSel = mesAtual || '';
  const prods  = getProdutosMes(mesSel);
  const kpis   = calcKpis(prods);

  el.innerHTML = `
  <div class="section-header"><div class="accent"></div>
    <h2>Margem de Lucro</h2>
    <span class="sub">Custo = M.P. + M.O. + M.Q. com precisão de centavos</span>
  </div>

  <!-- Seletor de mês -->
  <div class="card" style="margin-bottom:18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
    <div style="font-size:12px;font-weight:600;color:var(--navy)">Mês de referência:</div>
    <select id="selMesMargem" onchange="renderMargemTabela()" style="font-size:13px;font-weight:600;padding:6px 12px">
      ${todosMeses.map(m=>`<option value="${m}" ${m===mesSel?'selected':''}>${m}</option>`).join('')}
    </select>
    <div style="font-size:11px;color:var(--gray-med)">O custo é calculado como M.P.+M.O.+M.Q. do mês selecionado</div>
  </div>

  <!-- KPIs -->
  <div id="kpisMargem" style="margin-bottom:18px"></div>

  <!-- Tabela -->
  <div class="card">
    <div class="card-title">Preço de venda × Custo de fabricação</div>
    <div class="card-sub">Informe o preço de venda de cada produto (R$) · Os cálculos são automáticos · Dados salvos no navegador</div>
    <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
      <button onclick="salvarTodosPrecos()" style="background:var(--navy);color:white;border:none;border-radius:6px;padding:7px 18px;font-size:12px;font-weight:600;cursor:pointer">💾 Salvar preços</button>
      <button onclick="exportarMargemCSV()" style="background:var(--teal);color:white;border:none;border-radius:6px;padding:7px 18px;font-size:12px;font-weight:600;cursor:pointer">⬇ Exportar CSV</button>
      <div style="display:flex;align-items:center;gap:6px;background:#FEFBEC;border:1px solid #F9E79F;border-radius:6px;padding:5px 12px">
        <span style="font-size:12px;font-weight:600;color:#7D6608">Aplicar margem global:</span>
        <input type="number" id="margemGlobal" min="0" max="100" step="0.1" placeholder="0,0"
          style="width:70px;text-align:right;border:1px solid #F9E79F;border-radius:5px;padding:4px 6px;font-size:12px;font-family:'Courier New',monospace;color:#7D6608;background:white">
        <span style="font-size:12px;color:#7D6608">%</span>
        <button onclick="aplicarMargemGlobal()" style="background:#7D6608;color:white;border:none;border-radius:5px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer">Aplicar a todos</button>
      </div>
      <span id="msgMargem" style="font-size:11px;font-weight:600;align-self:center"></span>
    </div>
    <div style="overflow-x:auto">

function renderMargemTabela(){
  const selEl = document.getElementById('selMesMargem');
  if(!selEl) return;
  const mes = selEl.value;

  // Rebuild products for selected month
  const saved = localStorage.getItem('historico_custo');
  let historico = [];
  try{ historico = saved ? JSON.parse(saved) : []; }catch(e){}

  const map = {};
  historico.filter(r=>r.mes===mes).forEach(r=>{
    const custo = Math.round((r.mp + r.mo + r.mq)*100)/100;
    map[r.ref] = { ref:r.ref, desc:r.desc, familia:r.familia,
      mp:Math.round(r.mp*100)/100, mo:Math.round(r.mo*100)/100,
      mq:Math.round(r.mq*100)/100, custo, preco:PRECOS[r.ref]||0 };
  });
  // Fallback 1: SEED/D
  if(!Object.keys(map).length && D && D.stats_por_mes[mes]){
    (D.stats_por_mes[mes].produtos||[]).forEach(r=>{
      const custo = Math.round((r.mp+r.mo+r.mq)*100)/100;
      map[r.ref] = { ref:r.ref, desc:r.desc, familia:r.familia,
        mp:r.mp, mo:r.mo, mq:r.mq, custo, preco:PRECOS[r.ref]||0 };
    });
  }
  // Fallback 2: ESTRUTURAS (importados pela aba Estrutura do Produto)
  // Para cada produto importado, soma totalMp+totalMo+totalMq do mês
  carregarEstruturas();
  Object.entries(ESTRUTURAS).forEach(([ref, prod])=>{
    const mesDado = prod.meses ? prod.meses[mes] : null;
    if(!mesDado) return;
    // Suporte ao formato antigo (array) e novo (objeto com totais)
    let mp=0, mo=0, mq=0;
    if(Array.isArray(mesDado)){
      mp = mesDado.reduce((s,i)=>s+(i.total_mp||i.total||0),0);
      mo = mesDado.reduce((s,i)=>s+(i.total_mo||0),0);
      mq = mesDado.reduce((s,i)=>s+(i.total_mq||0),0);
    } else {
      mp = mesDado.totalMp || 0;
      mo = mesDado.totalMo || 0;
      mq = mesDado.totalMq || 0;
    }
    const custo = Math.round((mp+mo+mq)*100)/100;
    if(custo > 0 && !map[ref]){
      map[ref] = {
        ref,
        desc:    prod.desc || ref,
        familia: getFamilia ? getFamilia(prod.desc||'') : 'Outros',
        mp:  Math.round(mp*100)/100,
        mo:  Math.round(mo*100)/100,
        mq:  Math.round(mq*100)/100,
        custo,
        preco: PRECOS[ref] || 0,
      };
    }
  });

  const prods = Object.values(map).sort((a,b)=>b.custo-a.custo);

  // KPIs
  const comPreco   = prods.filter(p=>p.preco>0);
  const totCusto   = comPreco.reduce((s,p)=>s+p.custo,0);
  const totPreco   = comPreco.reduce((s,p)=>s+p.preco,0);
  const totMargem  = totPreco - totCusto;
  const margemPct  = totPreco  > 0 ? totMargem/totPreco*100  : 0;
  const markupPct  = totCusto  > 0 ? totMargem/totCusto*100  : 0;
  const prejuizos  = comPreco.filter(p=>p.preco < p.custo).length;

  const kpiEl = document.getElementById('kpisMargem');
  if(kpiEl) kpiEl.innerHTML = `
    <div class="kpi4">
      <div class="kpi-custo navy"><div class="top"><div>
        <div class="val">${Rk(totCusto)}</div>
        <div class="lbl">Custo Total — ${mes}</div>
      </div></div><div class="bot">${comPreco.length} de ${prods.length} produtos com preço</div></div>
      <div class="kpi-custo orange"><div class="top"><div>
        <div class="val">${Rk(totPreco)}</div>
        <div class="lbl">Receita Total (preços)</div>
      </div></div><div class="bot">soma dos preços de venda</div></div>
      <div class="kpi-custo ${totMargem>=0?'green':'red'}"><div class="top"><div>
        <div class="val">${totMargem>=0?'+':''}${Rk(totMargem)}</div>
        <div class="lbl">Margem Total (R$)</div>
      </div></div><div class="bot">${margemPct.toFixed(1)}% sobre preço · Markup ${markupPct.toFixed(1)}%</div></div>
      <div class="kpi-custo ${prejuizos>0?'red':'green'}"><div class="top"><div>
        <div class="val">${prejuizos}</div>
        <div class="lbl">Produtos com prejuízo</div>
      </div></div><div class="bot">${prejuizos>0?'⚠ preço abaixo do custo':'✅ todos acima do custo'}</div></div>
    </div>`;

  // Tabela
  const tbody = document.getElementById('tbodyMargem');
  if(!tbody) return;

  let rows = '';
  prods.forEach((p,idx)=>{
    const bg     = idx%2===0 ? 'white' : '#F8FAFB';
    const preco  = p.preco;
    const margR  = preco > 0 ? Math.round((preco - p.custo)*100)/100 : null;
    const margP  = preco > 0 && preco > 0 ? margR/preco*100 : null;
    const markP  = preco > 0 && p.custo > 0 ? margR/p.custo*100 : null;
    const isPrej = preco > 0 && preco < p.custo;
    const rowBg  = isPrej ? '#FFF5F5' : bg;
    const rowBdr = isPrej ? 'border-left:3px solid #C00000' : 'border-left:3px solid transparent';

    const mgSaved = PRECOS['mg_'+p.ref] || '';
    const margCell = margR===null
      ? `<td class="r" style="color:#ccc">–</td><td class="r" style="color:#ccc">–</td><td class="r" style="color:#ccc">–</td>`
      : `<td class="r mono" style="color:${margR>=0?'#375623':'#C00000'};font-weight:600">${margR>=0?'+':''}${R(margR,2)}</td>
         <td class="r"><span class="st ${margP>=0?'st-ok':'st-bad'}">${margP>=0?'+':''}${margP.toFixed(2)}%</span></td>
         <td class="r"><span class="st ${markP>=0?'st-ok':'st-bad'}">${markP>=0?'+':''}${markP.toFixed(2)}%</span></td>`;

    rows += `<tr style="background:${rowBg};${rowBdr}" data-custo="${p.custo}">
      <td class="ref-code">${p.ref}</td>
      <td class="desc-cell" title="${p.desc}" style="max-width:240px">${p.desc}</td>
      <td style="font-size:11px"><span class="st st-neu" style="background:${(FAM_C[p.familia]||'#94a3b8')}22;color:${FAM_C[p.familia]||'#94a3b8'};border:1px solid ${(FAM_C[p.familia]||'#94a3b8')}44">${p.familia}</span></td>
      <td class="r mono" style="color:#2E75B6">${R(p.mp,2)}</td>
      <td class="r mono" style="color:#375623">${R(p.mo,2)}</td>
      <td class="r mono" style="color:#7F3A00">${R(p.mq,2)}</td>
      <td class="r mono" style="font-weight:700;color:var(--navy)">${R(p.custo,2)}</td>
      <td style="text-align:right;padding:4px 8px">
        <input type="number" id="preco_${p.ref}" value="${preco||''}"
          min="0" step="0.01" placeholder="0,00"
          style="width:110px;text-align:right;border:1px solid #D0D8E4;border-radius:5px;padding:4px 7px;font-size:12px;font-family:'Courier New',monospace;color:var(--navy)"
          onchange="atualizarLinhaMargem('${p.ref}',${p.custo})"
          oninput="atualizarLinhaMargem('${p.ref}',${p.custo})">
      </td>
      <td style="text-align:center;padding:4px 6px">
        <div style="display:flex;align-items:center;gap:4px;justify-content:center">
          <input type="number" id="margpct_${p.ref}" value="${PRECOS['mg_'+p.ref]||''}"
            min="0" max="100" step="0.1" placeholder="0,0"
            style="width:70px;text-align:right;border:1px solid #F9E79F;border-radius:5px;padding:4px 6px;font-size:12px;font-family:'Courier New',monospace;color:#7D6608;background:#FEFBEC"
            oninput="calcPrecoFromMargem('${p.ref}',${p.custo})">
          <span style="font-size:11px;color:var(--gray-med)">%</span>
        </div>
        <div style="font-size:9px;color:var(--gray-med);margin-top:2px;text-align:center">sobre preço</div>
      </td>
      ${margCell}
    </tr>`;
  });

  // Totals row
  if(comPreco.length > 0){
    rows += `<tr style="background:#EBF3FB;font-weight:700;border-top:2px solid var(--navy)">
      <td colspan="3" style="padding:8px;color:var(--navy)">TOTAL (${comPreco.length} produtos)</td>
      <td class="r mono" style="color:#2E75B6">${R(comPreco.reduce((s,p)=>s+p.mp,0),2)}</td>
      <td class="r mono" style="color:#375623">${R(comPreco.reduce((s,p)=>s+p.mo,0),2)}</td>
      <td class="r mono" style="color:#7F3A00">${R(comPreco.reduce((s,p)=>s+p.mq,0),2)}</td>
      <td class="r mono" style="font-weight:700">${R(totCusto,2)}</td>
      <td class="r mono" style="font-weight:700">${R(totPreco,2)}</td>
      <td class="r mono" style="color:${totMargem>=0?'#375623':'#C00000'};font-weight:700">${totMargem>=0?'+':''}${R(totMargem,2)}</td>
      <td class="r"><span class="st ${margemPct>=0?'st-ok':'st-bad'}">${margemPct>=0?'+':''}${margemPct.toFixed(2)}%</span></td>
      <td class="r"><span class="st ${markupPct>=0?'st-ok':'st-bad'}">${markupPct>=0?'+':''}${markupPct.toFixed(2)}%</span></td>
    </tr>`;
  }

  tbody.innerHTML = rows;
}



function aplicarMargemGlobal(){
  const inpGlobal = document.getElementById('margemGlobal');
  if(!inpGlobal) return;
  const mg = parseFloat(inpGlobal.value) || 0;
  if(mg <= 0 || mg >= 100){
    const msg = document.getElementById('msgMargem');
    if(msg){ msg.textContent='⚠ Informe uma margem entre 0 e 100%.'; msg.style.color='var(--red)'; }
    return;
  }
  // Aplica a todos os produtos visíveis
  document.querySelectorAll('[id^="margpct_"]').forEach(inp=>{
    inp.value = mg.toFixed(1);
    const ref   = inp.id.replace('margpct_','');
    const row   = inp.closest('tr');
    const custo = row ? parseFloat(row.dataset.custo||0) : 0;
    if(custo > 0) calcPrecoFromMargem(ref, custo);
  });
  const msg = document.getElementById('msgMargem');
  if(msg){ msg.textContent=`✅ Margem de ${mg.toFixed(1)}% aplicada a todos!`; msg.style.color='var(--green)';
    setTimeout(()=>{ if(msg) msg.textContent=''; }, 3000); }
}

function calcPrecoFromMargem(ref, custo){
  const inpMg    = document.getElementById('margpct_'+ref);
  const inpPreco = document.getElementById('preco_'+ref);
  if(!inpMg || !inpPreco) return;
  const mg = parseFloat(inpMg.value) || 0;
  if(mg > 0 && mg < 100){
    // Margem % sobre preço: preco = custo / (1 - mg/100)
    const preco = Math.round(custo / (1 - mg/100) * 100) / 100;
    inpPreco.value = preco.toFixed(2);
    PRECOS[ref]        = preco;
    PRECOS['mg_'+ref]  = mg;
    atualizarLinhaMargem(ref, custo);
  } else if(mg === 0){
    inpPreco.value = '';
    delete PRECOS[ref];
    delete PRECOS['mg_'+ref];
    atualizarLinhaMargem(ref, custo);
  }
}

function atualizarLinhaMargem(ref, custo){
  const inp = document.getElementById('preco_'+ref);
  if(!inp) return;
  const preco = parseFloat(inp.value) || 0;
  PRECOS[ref] = preco;

  // Atualiza células da linha em tempo real
  const row  = inp.closest('tr');
  if(!row) return;
  const cells = row.querySelectorAll('td');
  // Colunas: 0=ref 1=desc 2=fam 3=mp 4=mo 5=mq 6=custo 7=input 8=margR 9=margP 10=markP
  if(preco > 0){
    const margR = Math.round((preco - custo)*100)/100;
    const margP = margR/preco*100;
    const markP = custo > 0 ? margR/custo*100 : 0;
    const sc    = margR>=0?'st-ok':'st-bad';
    if(cells[9]) cells[9].innerHTML = `<span class="mono" style="color:${margR>=0?'#375623':'#C00000'};font-weight:600">${margR>=0?'+':''}${R(margR,2)}</span>`;
    if(cells[10]) cells[10].innerHTML = `<span class="st ${sc}">${margP>=0?'+':''}${margP.toFixed(2)}%</span>`;
    if(cells[11]) cells[11].innerHTML = `<span class="st ${sc}">${markP>=0?'+':''}${markP.toFixed(2)}%</span>`;
    // Atualiza campo de margem % desejada para refletir o preço digitado
    if(preco > 0){
      const inpMg = document.getElementById('margpct_'+ref);
      if(inpMg && !inpMg.dataset.userEditing) inpMg.value = margP>=0 ? margP.toFixed(1) : '';
    }
    row.style.background = preco < custo ? '#FFF5F5' : '';
    row.style.borderLeft = preco < custo ? '3px solid #C00000' : '3px solid transparent';
  } else {
    if(cells[9]) cells[9].innerHTML = `<span style="color:#ccc">–</span>`;
    if(cells[10]) cells[10].innerHTML = `<span style="color:#ccc">–</span>`;
    if(cells[11]) cells[11].innerHTML = `<span style="color:#ccc">–</span>`;
    row.style.background = '';
    row.style.borderLeft = '3px solid transparent';
  }
}

function salvarTodosPrecos(){
  // Coleta todos os inputs da tabela
  document.querySelectorAll('[id^="preco_"]').forEach(inp=>{
    const ref   = inp.id.replace('preco_','');
    const preco = parseFloat(inp.value) || 0;
    if(preco > 0) PRECOS[ref] = preco;
    else          delete PRECOS[ref];
  });
  // Salva também as margens % desejadas
  document.querySelectorAll('[id^="margpct_"]').forEach(inp=>{
    const ref = inp.id.replace('margpct_','');
    const mg  = parseFloat(inp.value) || 0;
    if(mg > 0) PRECOS['mg_'+ref] = mg;
    else       delete PRECOS['mg_'+ref];
  });
  salvarPrecos();
  const msg = document.getElementById('msgMargem');
  if(msg){
    msg.textContent = '✅ Preços salvos!';
    msg.style.color = 'var(--green)';
    setTimeout(()=>{ if(msg) msg.textContent=''; }, 3000);
  }
  // Atualiza KPIs
  renderMargemTabela();
}

function exportarMargemCSV(){
  salvarTodosPrecos();
  const selEl = document.getElementById('selMesMargem');
  const mes   = selEl ? selEl.value : '';
  const rows  = [['Referencia','Descricao','Familia','MP (R$)','MO (R$)','MQ (R$)','Custo Total (R$)','Preco Venda (R$)','Margem R$','Margem %','Markup %']];

  document.querySelectorAll('#tbodyMargem tr:not(:last-child)').forEach(tr=>{
    const cells = tr.querySelectorAll('td');
    if(cells.length < 10) return;
    const ref   = cells[0].textContent.trim();
    const desc  = cells[1].textContent.trim();
    const fam   = cells[2].textContent.trim();
    const mp    = cells[3].textContent.trim();
    const mo    = cells[4].textContent.trim();
    const mq    = cells[5].textContent.trim();
    const custo = cells[6].textContent.trim();
    const inp   = tr.querySelector('input');
    const preco = inp ? inp.value : '';
    const margR = cells[8].textContent.trim();
    const margP = cells[9].textContent.trim();
    const markP = cells[10].textContent.trim();
    rows.push([ref,desc,fam,mp,mo,mq,custo,preco,margR,margP,markP]);

  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'margem_'+mes.replace('/','_')+'.csv';

}

async function forceSyncToSupabase(){
  const btn = document.getElementById('btnForcSync');
  const msg = document.getElementById('msgForcSync');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Sincronizando...'; }

  try{
    // Carrega TUDO do localStorage
    let hist=[], estr={}, prec={}, refs=[];
    try{ const s=localStorage.getItem('historico_custo');   if(s) hist=JSON.parse(s); }catch(e){}
    try{ const s=localStorage.getItem('estruturas_prod');   if(s) estr=JSON.parse(s); }catch(e){}
    try{ const s=localStorage.getItem('precos_venda');      if(s) prec=JSON.parse(s); }catch(e){}
    try{ const s=localStorage.getItem('refs_config');       if(s) refs=JSON.parse(s); }catch(e){}

    const body = {
      id:         'singleton',
      historico:  hist,
      estruturas: estr,
      precos:     prec,
      refs_config:refs,
      atualizado: new Date().toISOString(),
    };

    // Tenta PATCH primeiro, se falhar faz POST
    let r = await supaFetch('/rest/v1/dados_dashboard?id=eq.singleton', {
      method: 'PATCH',
      headers: {'Prefer':'return=representation'},
      body: JSON.stringify(body)
    });

    if(!r.ok || (await r.clone().json()).length === 0){
      r = await supaFetch('/rest/v1/dados_dashboard', {
        method: 'POST',
        body: JSON.stringify(body)
      });
    }

    if(msg){
      msg.textContent = `✅ Sincronizado! ${hist.length} registros de histórico, ${Object.keys(estr).length} estruturas, ${Object.keys(prec).length} preços.`;
      msg.style.color = 'var(--green)';
    }

    if(el){ el.textContent='🟢 Supabase sincronizado'; el.style.color='#34c77b'; el.style.background='rgba(52,199,123,0.2)'; }
  } catch(err){
    if(msg){ msg.textContent = '❌ Erro: '+err.message; msg.style.color='var(--red)'; }
  } finally {
    if(btn){ btn.disabled=false; btn.textContent='☁ Enviar dados ao Supabase'; }
  }
}

async function _pushSupabase(payload){
  try{
    // Lê dados atuais do Supabase para merge
    const r = await supaFetch('/rest/v1/dados_dashboard?id=eq.singleton&select=*');
    let atual = {};
    if(r.ok){ const arr = await r.json(); if(arr.length) atual = arr[0]; }

    // Merge cuidadoso: usa dado do payload se presente, senão mantém o que já está no Supabase
    // Nunca sobrescreve um campo com valor vazio se já existe dado no banco
    const body = {
      id:         'singleton',
      historico:  'historico_custo'  in payload ? payload.historico_custo  : (atual.historico  || []),
      estruturas: 'estruturas_prod'  in payload ? payload.estruturas_prod  : (atual.estruturas || {}),
      precos:     'precos_venda'     in payload ? payload.precos_venda     : (atual.precos     || {}),
      refs_config:'refs_config'      in payload ? payload.refs_config      : (atual.refs_config|| []),
      atualizado: new Date().toISOString(),
    };

    const upd = await supaFetch('/rest/v1/dados_dashboard?id=eq.singleton', {
      method: 'PATCH',
      headers: {'Prefer':'return=minimal'},
      body: JSON.stringify(body)
    });

    if(upd.status===404 || upd.status===406){
      // Linha não existe — insere
      await supaFetch('/rest/v1/dados_dashboard', {
        method: 'POST',
        body: JSON.stringify(body)
      });
    }
    const el = document.getElementById('serverStatus');
    if(el){ el.textContent='🟢 '+new Date().toLocaleTimeString('pt-BR'); el.style.color='#34c77b'; el.style.background='rgba(52,199,123,0.2)'; }
  } catch(e){
    console.warn('Supabase sync falhou (dados salvos localmente):', e.message);
    const el = document.getElementById('serverStatus');
    if(el){ el.textContent='🟡 Local'; el.style.color='#f5a623'; el.style.background='rgba(245,166,35,0.15)'; }
  }
}

async function carregarDadosServidor(){
  try{
    const r = await supaFetch('/rest/v1/dados_dashboard?id=eq.singleton&select=*');
    if(!r.ok) throw new Error('HTTP '+r.status);
    const arr = await r.json();
    if(!arr.length) throw new Error('vazio');
    const dados = arr[0];

    if(dados.historico && dados.historico.length){
      HISTORICO = dados.historico;
      try{ localStorage.setItem('historico_custo', JSON.stringify(HISTORICO)); }catch(e){}
    }
    if(dados.estruturas && Object.keys(dados.estruturas).length){
      ESTRUTURAS = dados.estruturas;
      try{ localStorage.setItem('estruturas_prod', JSON.stringify(ESTRUTURAS)); }catch(e){}
    }
    if(dados.precos && Object.keys(dados.precos).length){
      PRECOS = dados.precos;
      try{ localStorage.setItem('precos_venda', JSON.stringify(PRECOS)); }catch(e){}
    }
    if(dados.refs_config && dados.refs_config.length){
      try{ localStorage.setItem('refs_config', JSON.stringify(dados.refs_config)); }catch(e){}
    }
    carregarRefs();
    if(HISTORICO.length){ rebuildAndRender(); } else { useSeed(); }
    const el = document.getElementById('serverStatus');
    if(el){ el.textContent='🟢 Supabase conectado'; el.style.color='#34c77b'; el.style.background='rgba(52,199,123,0.2)'; }
  } catch(err){
    console.warn('Supabase indisponível, usando cache local:', err.message);
    const el = document.getElementById('serverStatus');
    if(el){ el.textContent='🔴 Offline — dados locais'; el.style.color='#f08080'; el.style.background='rgba(240,82,82,0.15)'; }
    carregarDadosLocal();
  }
}

function carregarDadosLocal(){
  try {
    const saved = localStorage.getItem('historico_custo');
    if(saved){ const p=JSON.parse(saved); if(p&&p.length){ HISTORICO=p; carregarRefs(); rebuildAndRender(); return; } }
  } catch(e){}
  useSeed();
}

window.addEventListener('DOMContentLoaded', function(){
  // Tenta Supabase primeiro, fallback para localStorage
  carregarDadosServidor();
});
</script>
